<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPIH商流業務フロー マインドマップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'メイリオ', 'Meiryo', 'Yu Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .header .meta {
            font-size: 14px;
            color: #666;
        }

        .mindmap-wrapper {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: auto;
        }

        .mindmap-svg {
            display: block;
            margin: 0 auto;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: white;
            border-radius: 25px;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            font-size: 12px;
            color: #666;
        }

        /* ノードのホバーエフェクト */
        .node-group {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .node-group:hover {
            transform: scale(1.05);
        }

        .node-group:hover .node-bg {
            filter: brightness(1.1);
        }

        /* 印刷用 */
        @media print {
            body {
                background: white;
                padding: 10px;
            }
            .header, .mindmap-wrapper, .legend, .footer {
                box-shadow: none;
                break-inside: avoid;
            }
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 20px;
            }
            .mindmap-wrapper {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 PPIH商流業務フロー マインドマップ</h1>
            <div class="meta">バージョン: 1.0 | 作成日: 2026年3月19日 | 対象ツール: Microsoft Visio（M365版）</div>
        </div>

        <div class="mindmap-wrapper">
            <svg class="mindmap-svg" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- グラデーション定義 -->
                    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea"/>
                        <stop offset="100%" style="stop-color:#764ba2"/>
                    </linearGradient>
                    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#5a9bd4"/>
                        <stop offset="100%" style="stop-color:#4472c4"/>
                    </linearGradient>
                    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#8dc263"/>
                        <stop offset="100%" style="stop-color:#70ad47"/>
                    </linearGradient>
                    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f4a460"/>
                        <stop offset="100%" style="stop-color:#ed7d31"/>
                    </linearGradient>
                    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffd700"/>
                        <stop offset="100%" style="stop-color:#ffc000"/>
                    </linearGradient>
                    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#dc3545"/>
                        <stop offset="100%" style="stop-color:#c00000"/>
                    </linearGradient>

                    <!-- ドロップシャドウ -->
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
                    </filter>
                    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
                    </filter>
                </defs>

                <!-- コネクタライン -->
                <g stroke="#a0a0a0" stroke-width="2" fill="none" opacity="0.6">
                    <!-- 中央から第1階層 -->
                    <path d="M600,400 Q450,400 280,180"/>
                    <path d="M600,400 Q400,400 280,300"/>
                    <path d="M600,400 Q350,400 280,450"/>
                    <path d="M600,400 Q400,500 280,600"/>
                    <path d="M600,400 Q800,500 920,600"/>
                    <path d="M600,400 Q800,400 920,450"/>
                    <path d="M600,400 Q750,300 920,250"/>

                    <!-- 第1階層から第2階層 -->
                    <!-- 仕入れ元 -->
                    <path d="M180,180 Q120,180 100,140"/>
                    <path d="M180,180 Q120,200 100,220"/>

                    <!-- 初期接触 -->
                    <path d="M180,300 Q120,290 100,270"/>
                    <path d="M180,300 Q120,320 100,340"/>

                    <!-- 商品部 -->
                    <path d="M180,450 Q120,450 100,450"/>

                    <!-- 事務作業 -->
                    <path d="M180,600 Q100,560 80,540"/>
                    <path d="M180,600 Q100,590 80,575"/>
                    <path d="M180,600 Q100,620 80,610"/>
                    <path d="M180,600 Q100,650 80,645"/>
                    <path d="M180,600 Q100,680 80,680"/>
                    <path d="M180,600 Q100,710 80,715"/>
                    <path d="M180,600 Q100,740 80,750"/>

                    <!-- 会議・共有 -->
                    <path d="M1020,600 Q1080,560 1100,540"/>
                    <path d="M1020,600 Q1080,590 1100,580"/>
                    <path d="M1100,580 Q1130,610 1150,620"/>
                    <path d="M1100,580 Q1130,640 1150,660"/>

                    <!-- 取り組み開始 -->
                    <path d="M1020,450 Q1080,420 1100,400"/>
                    <path d="M1020,450 Q1080,440 1100,430"/>
                    <path d="M1020,450 Q1080,460 1100,460"/>
                    <path d="M1020,450 Q1080,480 1100,490"/>
                    <path d="M1020,450 Q1080,500 1100,520"/>

                    <!-- 3ヶ月後ジャッジ -->
                    <path d="M1020,250 Q1080,200 1100,180"/>
                    <path d="M1020,250 Q1080,230 1100,220"/>
                    <path d="M1020,250 Q1080,260 1100,260"/>
                    <path d="M1100,260 Q1130,290 1150,300"/>
                    <path d="M1100,260 Q1130,320 1150,340"/>
                    <path d="M1150,340 Q1170,370 1180,390"/>
                </g>

                <!-- 中央ノード -->
                <g class="node-group" transform="translate(600, 400)">
                    <ellipse class="node-bg" cx="0" cy="0" rx="120" ry="45" fill="url(#rootGrad)" filter="url(#shadow)"/>
                    <text x="0" y="5" text-anchor="middle" fill="white" font-size="16" font-weight="bold">PPIH商流業務フロー</text>
                </g>

                <!-- ===== 第1階層: 仕入れ元 (ブルー) ===== -->
                <g class="node-group" transform="translate(180, 180)">
                    <rect class="node-bg" x="-80" y="-25" width="160" height="50" rx="25" fill="url(#blueGrad)" filter="url(#shadow)"/>
                    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">仕入れ元</text>
                </g>
                <!-- 第2階層 -->
                <g transform="translate(60, 140)">
                    <rect x="-45" y="-15" width="90" height="30" rx="15" fill="white" stroke="#4472c4" stroke-width="2" filter="url(#shadowLight)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="11">メーカー</text>
                </g>
                <g transform="translate(60, 220)">
                    <rect x="-45" y="-15" width="90" height="30" rx="15" fill="white" stroke="#4472c4" stroke-width="2" filter="url(#shadowLight)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="11">仕入れ先</text>
                </g>

                <!-- ===== 第1階層: 初期接触 (ブルー) ===== -->
                <g class="node-group" transform="translate(180, 300)">
                    <rect class="node-bg" x="-80" y="-25" width="160" height="50" rx="25" fill="url(#blueGrad)" filter="url(#shadow)"/>
                    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">初期接触</text>
                </g>
                <!-- 第2階層 -->
                <g transform="translate(60, 270)">
                    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="white" stroke="#4472c4" stroke-width="2" filter="url(#shadowLight)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="11">定期商談</text>
                </g>
                <g transform="translate(60, 340)">
                    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="white" stroke="#4472c4" stroke-width="2" filter="url(#shadowLight)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="11">問い合わせ</text>
                </g>

                <!-- ===== 第1階層: 商品部 (グリーン) ===== -->
                <g class="node-group" transform="translate(180, 450)">
                    <rect class="node-bg" x="-100" y="-30" width="200" height="60" rx="30" fill="url(#greenGrad)" filter="url(#shadow)"/>
                    <text x="0" y="-5" text-anchor="middle" fill="white" font-size="13" font-weight="bold">商品部</text>
                    <text x="0" y="15" text-anchor="middle" fill="white" font-size="11">（仕入れ担当）</text>
                </g>
                <!-- 第2階層 -->
                <g transform="translate(60, 450)">
                    <rect x="-55" y="-15" width="110" height="30" rx="15" fill="white" stroke="#70ad47" stroke-width="2" filter="url(#shadowLight)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="10">情報共有MTG（週1）</text>
                </g>

                <!-- ===== 第1階層: 事務作業 (グリーン) ===== -->
                <g class="node-group" transform="translate(180, 600)">
                    <rect class="node-bg" x="-80" y="-25" width="160" height="50" rx="25" fill="url(#greenGrad)" filter="url(#shadow)"/>
                    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">事務作業</text>
                </g>
                <!-- 第2階層 -->
                <g transform="translate(45, 540)">
                    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="white" stroke="#70ad47" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="10">商品登録</text>
                </g>
                <g transform="translate(45, 575)">
                    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="white" stroke="#70ad47" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="9">ダイレクト掲載依頼</text>
                </g>
                <g transform="translate(45, 610)">
                    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="white" stroke="#70ad47" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="10">規定書作成</text>
                </g>
                <g transform="translate(45, 645)">
                    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="white" stroke="#70ad47" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="10">販促作成（社内）</text>
                </g>
                <g transform="translate(45, 680)">
                    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="white" stroke="#70ad47" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="9">販促作成依頼（社外）</text>
                </g>
                <g transform="translate(45, 715)">
                    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="white" stroke="#70ad47" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="9">クイックコネクト保存</text>
                </g>
                <g transform="translate(45, 750)">
                    <rect x="-50" y="-12" width="100" height="24" rx="12" fill="white" stroke="#70ad47" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="10">施策リスト作成</text>
                </g>

                <!-- ===== 第1階層: 会議・共有 (オレンジ) ===== -->
                <g class="node-group" transform="translate(1020, 600)">
                    <rect class="node-bg" x="-80" y="-25" width="160" height="50" rx="25" fill="url(#orangeGrad)" filter="url(#shadow)"/>
                    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">会議・共有</text>
                </g>
                <!-- 第2階層 -->
                <g transform="translate(1120, 540)">
                    <rect x="-70" y="-15" width="140" height="30" rx="15" fill="white" stroke="#ed7d31" stroke-width="2" filter="url(#shadowLight)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="9">取り組み商品共有MTG（月1）</text>
                </g>
                <g transform="translate(1120, 580)">
                    <rect x="-70" y="-15" width="140" height="30" rx="15" fill="white" stroke="#ed7d31" stroke-width="2" filter="url(#shadowLight)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="9">PPIH営業会議施策共有（月1）</text>
                </g>
                <!-- 第3階層 -->
                <g transform="translate(1170, 620)">
                    <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#fff5eb" stroke="#ed7d31" stroke-width="1.5"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="9">議事録配信</text>
                </g>
                <g transform="translate(1170, 660)">
                    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="#fff5eb" stroke="#ed7d31" stroke-width="1.5"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="9">施策販促準備（浦和事務所）</text>
                </g>

                <!-- ===== 第1階層: 取り組み開始 (イエロー) ===== -->
                <g class="node-group" transform="translate(1020, 450)">
                    <rect class="node-bg" x="-80" y="-25" width="160" height="50" rx="25" fill="url(#yellowGrad)" filter="url(#shadow)"/>
                    <text x="0" y="5" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">取り組み開始</text>
                </g>
                <!-- 第2階層 -->
                <g transform="translate(1120, 400)">
                    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="white" stroke="#ffc000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="10">在庫有無確認</text>
                </g>
                <g transform="translate(1120, 430)">
                    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="white" stroke="#ffc000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="9">販促在庫有無確認</text>
                </g>
                <g transform="translate(1120, 460)">
                    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="white" stroke="#ffc000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="10">マスタ登録確認</text>
                </g>
                <g transform="translate(1120, 490)">
                    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="white" stroke="#ffc000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="8">Nランク在庫チェック、発注</text>
                </g>
                <g transform="translate(1120, 520)">
                    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="white" stroke="#ffc000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="10">ランク変更</text>
                </g>

                <!-- ===== 第1階層: 3ヶ月後ジャッジ (レッド) ===== -->
                <g class="node-group" transform="translate(1020, 250)">
                    <rect class="node-bg" x="-90" y="-28" width="180" height="56" rx="28" fill="url(#redGrad)" filter="url(#shadow)"/>
                    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="bold">3ヶ月後ジャッジ</text>
                </g>
                <!-- 第2階層 -->
                <g transform="translate(1120, 180)">
                    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="white" stroke="#c00000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="11">拡販</text>
                </g>
                <g transform="translate(1120, 220)">
                    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="white" stroke="#c00000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="11">保留</text>
                </g>
                <g transform="translate(1120, 260)">
                    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="white" stroke="#c00000" stroke-width="2"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="11">撤退</text>
                </g>
                <!-- 第3階層 -->
                <g transform="translate(1170, 300)">
                    <rect x="-55" y="-12" width="110" height="24" rx="12" fill="#fff0f0" stroke="#c00000" stroke-width="1.5"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="9">現状の売価で売り切る</text>
                </g>
                <g transform="translate(1170, 340)">
                    <rect x="-65" y="-12" width="130" height="24" rx="12" fill="#fff0f0" stroke="#c00000" stroke-width="1.5"/>
                    <text x="0" y="4" text-anchor="middle" fill="#333" font-size="8">仕入れ値5%で処分特価に値下げ</text>
                </g>
                <!-- 第4階層 -->
                <g transform="translate(1180, 380)">
                    <rect x="-60" y="-12" width="120" height="24" rx="12" fill="#ffe0e0" stroke="#c00000" stroke-width="1"/>
                    <text x="0" y="4" text-anchor="middle" fill="#c00000" font-size="8">【特価商品・処分リスト】に追加</text>
                </g>
            </svg>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #4472c4;"></div>
                    <span>仕入れ元・初期接触</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #70ad47;"></div>
                    <span>商品部・事務作業</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ed7d31;"></div>
                    <span>会議・共有</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffc000;"></div>
                    <span>取り組み開始</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #c00000;"></div>
                    <span>ジャッジ・撤退</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>このファイルは完全に自己完結しています。インターネット接続不要でどのPCでも開けます。</p>
            <p>SharePoint / OneDrive / Teams にアップロードしてご利用ください。印刷（Ctrl+P）でPDF出力も可能です。</p>
        </div>
    </div>
</body>
</html>
